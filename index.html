<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPMS Pro Dashboard</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">

    <!-- CDN Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="splash">
        <div class="logo">🚗</div>
        <div class="text">TPMS PRO</div>
    </div>

    <h1>🚗 TPMS Pro Dashboard</h1>

    <div class="dashboard">
        <div id="car3d"></div>

        <div class="tires">
            <div class="card" id="fl">
                <h2>Front Left</h2>
                <div class="psi">-- PSI</div>
                <div class="temp">--°C</div>
            </div>

            <div class="card" id="fr">
                <h2>Front Right</h2>
                <div class="psi">-- PSI</div>
                <div class="temp">--°C</div>
            </div>

            <div class="card" id="rl">
                <h2>Rear Left</h2>
                <div class="psi">-- PSI</div>
                <div class="temp">--°C</div>
            </div>

            <div class="card" id="rr">
                <h2>Rear Right</h2>
                <div class="psi">-- PSI</div>
                <div class="temp">--°C</div>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="pressureChart"></canvas>
    </div>

    <!-- Scripts -->
    <script src="js/car3d.js?v=1.3"></script>
    <script src="js/chart.js?v=1.1"></script>
    <script src="js/alerts.js?v=1.1"></script>
    <script src="js/ws.js?v=1.3"></script>
    <script src="js/app.js?v=1.1"></script>

</body>
</html>
